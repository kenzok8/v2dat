name: self-iterate

on:
  workflow_dispatch:
  schedule:
    - cron: '35 2 1 * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  deps-refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version-file: go.mod

      - name: Update dependencies
        id: upd
        run: |
          set -euo pipefail
          go get -u=patch ./...
          go mod tidy
          go test ./...
          go build ./...
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            BRANCH="chore/monthly-maintenance-$(date +%Y%m%d)"
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git checkout -b "$BRANCH"
            git add go.mod go.sum
            git commit -m "chore: monthly dependency refresh"
            git push origin "$BRANCH"
          fi

      - name: Create or update PR
        if: steps.upd.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.upd.outputs.branch }}
        run: |
          set -euo pipefail
          PR_URL=$(gh pr list --base main --head "$BRANCH" --state open --json url --jq '.[0].url')
          if [ -z "$PR_URL" ] || [ "$PR_URL" = "null" ]; then
            PR_BODY=$(printf '%s\n' \
              '## Summary' \
              '- refresh Go modules with patch-level updates' \
              '- run go mod tidy, go test ./..., and go build ./...' \
              '- monthly automated maintenance review')
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: monthly dependency refresh" \
              --body "$PR_BODY"
          fi
